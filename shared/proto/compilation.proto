syntax = "proto3";
package aura.compilation.v1;

service CompilationService {
  rpc CompileModel(CompileModelRequest) returns (CompileModelResponse);
  rpc GetCompilationStatus(GetCompilationStatusRequest) returns (CompileModelResponse);
}

message CompileModelRequest {
  string model_id = 1;
  string source_key = 2;
  string hardware_type = 3;
  int32 num_classes = 4;
  repeated string class_names = 5;
  string dataset_version_id = 6;
  string dataset_key = 7;
}
message GetCompilationStatusRequest { string model_id = 1; }
message CompileModelResponse {
  string model_id = 1;
  string status = 2;
  string compiled_key = 3;
  string compiled_sha256 = 4;
  string error = 5;
}
