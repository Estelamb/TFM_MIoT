# Run from project root: docker compose -f docker/deployment-service.yml up -d
name: aura
networks:
  aura-net:
    driver: bridge
volumes:
  postgres-data:
  minio-data:
  mosquitto-data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aura}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    networks: [aura-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura}"]
      interval: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: aura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aura}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aura_dev}
    volumes: [minio-data:/data]
    ports: ["9000:9000", "9001:9001"]
    networks: [aura-net]
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aura-mosquitto
    volumes:
      - ../infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    ports: ["1883:1883"]
    networks: [aura-net]
  deployment-service:
    build: { context: .., dockerfile: services/deployment-service/Dockerfile }
    container_name: aura-deployment-service
    depends_on:
      postgres: { condition: service_healthy }
      mosquitto: { condition: service_started }
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-aura}:${POSTGRES_PASSWORD:-aura_dev}@postgres:5432/${POSTGRES_DB:-aura}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aura}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aura_dev}
      MINIO_SECURE: "false"
      MINIO_BUCKET_COMPILED: compiled
      MINIO_BUCKET_SCRIPTS: scripts
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      AI_SERVICE_GRPC: ${AI_SERVICE_GRPC:-host.docker.internal:50052}
      SCRIPT_SERVICE_GRPC: ${SCRIPT_SERVICE_GRPC:-host.docker.internal:50053}
      LOG_LEVEL: DEBUG
    ports: ["50055:50055"]
    networks: [aura-net]
    volumes: [../services/deployment-service/app:/app/app, ./shared:/app/shared]
    extra_hosts:
      - "host.docker.internal:host-gateway"
