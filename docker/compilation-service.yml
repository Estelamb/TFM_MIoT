# Run from project root: docker compose -f docker/compilation-service.yml up -d
# Requiere ai-service corriendo en localhost:50052 (o ajustar AI_SERVICE_GRPC)
name: aura
networks:
  aura-net:
    driver: bridge
volumes:
  minio-data:
services:
  minio:
    image: minio/minio:latest
    container_name: aura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aura}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aura_dev}
    volumes: [minio-data:/data]
    ports: ["9000:9000", "9001:9001"]
    networks: [aura-net]
  compilation-service:
    build: { context: .., dockerfile: services/compilation-service/Dockerfile }
    container_name: aura-compilation-service
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aura}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aura_dev}
      MINIO_SECURE: "false"
      MINIO_BUCKET_MODELS: models
      MINIO_BUCKET_COMPILED: compiled
      AI_SERVICE_GRPC: ${AI_SERVICE_GRPC:-host.docker.internal:50052}
      HAILO_DOCKER_IMAGE: ${HAILO_DOCKER_IMAGE:-hailo_ai_sw_suite:latest}
      LOG_LEVEL: DEBUG
    ports: ["50054:50054"]
    networks: [aura-net]
    volumes:
      - ../services/compilation-service/app:/app/app
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
