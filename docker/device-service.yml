# Run from project root: docker compose -f docker/device-service.yml up -d
networks:
  aura-net:
    driver: bridge
volumes:
  postgres-data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aura}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    networks: [aura-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura}"]
      interval: 5s; retries: 5
  device-service:
    build: { context: .., dockerfile: services/device-service/Dockerfile }
    container_name: aura-device-service
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-aura}:${POSTGRES_PASSWORD:-aura_dev}@postgres:5432/${POSTGRES_DB:-aura}
      LOG_LEVEL: DEBUG
    ports: ["50051:50051"]
    networks: [aura-net]
    volumes: [../services/device-service/app:/app/app, ./shared:/app/shared]
