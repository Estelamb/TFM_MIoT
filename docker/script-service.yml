# Run from project root: docker compose -f docker/script-service.yml up -d
networks:
  aura-net:
    driver: bridge
volumes:
  postgres-data:
  minio-data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aura}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    networks: [aura-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura}"]
      interval: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: aura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aura}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aura_dev}
    volumes: [minio-data:/data]
    ports: ["9000:9000", "9001:9001"]
    networks: [aura-net]
  script-service:
    build: { context: .., dockerfile: services/script-service/Dockerfile }
    container_name: aura-script-service
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-aura}:${POSTGRES_PASSWORD:-aura_dev}@postgres:5432/${POSTGRES_DB:-aura}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aura}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aura_dev}
      MINIO_SECURE: "false"
      MINIO_BUCKET_SCRIPTS: scripts
      LOG_LEVEL: DEBUG
    ports: ["50053:50053"]
    networks: [aura-net]
    volumes: [../services/script-service/app:/app/app, ./shared:/app/shared]
