# ─────────────────────────────────────────────────────────────────────────────
# AURA Edge Runtime — Components Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Describes the physical/virtual components attached to this edge device.
#
# Each component has:
#   id       — unique identifier used in telemetry and local_state
#   type     — device category: camera | sensor | gpio
#   driver   — backend driver to use (see table below)
#   enabled  — whether the DeviceManager should activate this component
#   params   — driver-specific parameters
#
# ┌──────────────┬──────────────┬────────────────────────────────────────────┐
# │ type         │ driver       │ Backend class                               │
# ├──────────────┼──────────────┼────────────────────────────────────────────┤
# │ camera       │ opencv       │ OpenCVCameraBackend (USB/CSI/RTSP/file)     │
# │ camera       │ libcamera    │ LibcameraBackend (RPi CSI native)           │
# │ camera       │ imx500       │ IMX500CameraBackend (Sony AI Camera frames) │
# │ sensor       │ bme280       │ BME280Backend (I2C temp/humidity/pressure)  │
# └──────────────┴──────────────┴────────────────────────────────────────────┘

components:

  # ── Primary camera ─────────────────────────────────────────────────────────
  # Change driver to "libcamera" or "imx500" depending on your hardware.
  - id: camera_0
    type: camera
    driver: opencv
    enabled: true
    params:
      source: 0               # int device index, or RTSP/file URI string
      resolution: [640, 480]
      fps: 10

  # ── Example: Raspberry Pi CSI camera via libcamera ─────────────────────────
  # - id: camera_0
  #   type: camera
  #   driver: libcamera
  #   enabled: true
  #   params:
  #     resolution: [640, 480]
  #     fps: 10
  #     camera_index: 0       # index when multiple CSI cameras are attached

  # ── Example: Sony IMX500 AI Camera (frame capture only) ────────────────────
  # - id: camera_0
  #   type: camera
  #   driver: imx500
  #   enabled: true
  #   params:
  #     resolution: [640, 480]
  #     fps: 10

  # ── Environmental sensor — BME280 via I2C ──────────────────────────────────
  # - id: env_sensor_0
  #   type: sensor
  #   driver: bme280
  #   enabled: false
  #   params:
  #     bus: 1                     # I2C bus number (1 on RPi 3/4/5)
  #     address: "0x76"            # 0x76 (SDO→GND) or 0x77 (SDO→VCC)
  #     measurements: [temperature, humidity, pressure]
