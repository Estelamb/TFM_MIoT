version: '3.8'

services:
  edge-agent:
    build:
      context: ..
      dockerfile: edge-runtime/Dockerfile
    container_name: aura-edge-agent
    restart: unless-stopped
    environment:
      - AURA_DEVICE_ID=a7b02342-4d3e-412a-b821-81194fc46f7a
      - AURA_MQTT_HOST=mosquitto
      - AURA_MQTT_PORT=1883
      - AURA_HARDWARE_TYPE=rpi
      - AURA_TELEMETRY_INTERVAL=10
      - AURA_INFERENCE_INTERVAL=0.1
      - AURA_LOG_LEVEL=INFO
      - AURA_WORK_DIR=/tmp/aura
    # devices:
    #   # Monta la cámara de la Raspberry Pi (USB o módulo de cámara CSI)
    #   - "/dev/video0:/dev/video0"
    volumes:
      - edge-agent-data:/tmp/aura
      # Configuración local desde el host (solo lectura)
      - ./config:/app/config:ro
      # Librerías de hardware — persistente entre reinicios.
      # Se llena vía OTA (update_libraries) al conectarse a la plataforma.
      - edge-agent-hardware:/app/hardware
    networks:
      - aura-net

volumes:
  edge-agent-data:
  edge-agent-hardware:

networks:
  aura-net:
    name: aura_aura-net
    external: true

